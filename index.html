<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVORA Tracker Pro</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1,h2,h3{
margin-top:0;
}

input,select,button,textarea{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
font-size:16px !important;
-webkit-appearance:none;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.row-btn{
display:flex;
gap:8px;
}

.row-btn button{
width:50%;
}

.grid-barang{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.item-barang{
background:#222;
padding:10px;
border-radius:10px;
min-width:120px;
font-size:12px;
}

.item-barang button{
width:auto;
padding:4px 8px;
margin-top:6px;
font-size:11px;
}

.btn-edit{background:#f59e0b;color:white;}
.btn-delete{background:#ef4444;color:white;}

.scroll-box{
max-height:250px;
overflow-y:auto;
}

.row-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
</style>
</head>
<body>

<h1>EVORA TRACKER PRO</h1>

<div class="card">
<h3>Dashboard Bulan Aktif</h3>
<p id="bulanAktif"></p>
<div class="stats">
<div class="stat">Botol<br><span id="stokBotol">0</span></div>
<div class="stat">Box<br><span id="stokBox">0</span></div>
<div class="stat">Barang<br><span id="totalBarang">0</span></div>
<div class="stat">Omzet<br><span id="omzet">Rp 0</span></div>
<div class="stat">Pengeluaran<br><span id="pengeluaran">Rp 0</span></div>
<div class="stat">Laba<br><span id="laba">Rp 0</span></div>
</div>
</div>

<div class="card">
<h3>Stock Botol</h3>
<input id="botolInput" type="number" placeholder="Qty Botol">
<div class="row-btn">
<button onclick="kurangBotol()">Kurang</button>
<button onclick="tambahBotol()">Tambah</button>
</div>

<h3>Stock Box</h3>
<input id="boxInput" type="number" placeholder="Qty Box">
<div class="row-btn">
<button onclick="kurangBox()">Kurang</button>
<button onclick="tambahBox()">Tambah</button>
</div>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="qtyBarang" type="number" placeholder="Qty Stok">
<button onclick="tambahBarang()">Tambah Barang</button>
</div>

<div class="card">
<h3>Daftar Barang</h3>
<div id="listBarang" class="grid-barang"></div>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="barangJual"></select>
<input id="qtyJual" type="number" placeholder="Qty">
<input id="nominalJual" type="number" placeholder="Nominal Rp">
<button onclick="jualBarang()">Simpan Penjualan</button>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<input id="nominalKeluar" type="number" placeholder="Nominal">
<input id="ketKeluar" placeholder="Keterangan">
<button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
</div>

<div class="card">
<h3>Riwayat Bulanan</h3>
<select id="bulanSelect" onchange="render()"></select>
</div>

<div class="card">
<h3>Summary Bulanan</h3>
<div id="summaryBulanan"></div>
</div>

<div class="card">
<h3>Top Selling</h3>
<div id="topSelling"></div>
</div>

<div class="row-2">
<div class="card">
<h3>Detail Penjualan</h3>
<div id="riwayatJual" class="scroll-box"></div>
</div>

<div class="card">
<h3>Detail Pengeluaran</h3>
<div id="riwayatKeluar" class="scroll-box"></div>
</div>
</div>

<div class="card">
<button onclick="resetData()">RESET SEMUA DATA</button>
</div>

<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let barang = JSON.parse(localStorage.getItem("barang") || "[]");
let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");
let pengeluaran = JSON.parse(localStorage.getItem("pengeluaran") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("barang", JSON.stringify(barang));
localStorage.setItem("penjualan", JSON.stringify(penjualan));
localStorage.setItem("pengeluaran", JSON.stringify(pengeluaran));
}

function getMonthKey(date){
let d = new Date(date);
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function getMonthLabel(key){
let [y,m] = key.split("-");
let namaBulan = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];
return `${namaBulan[Number(m)-1]} ${y}`;
}

function updateMonthSelect(){
let set = new Set();

penjualan.forEach(x=>set.add(getMonthKey(x.tanggal)));
pengeluaran.forEach(x=>set.add(getMonthKey(x.tanggal)));

let currentMonth = getMonthKey(new Date());
set.add(currentMonth);

let html = "";
[...set].sort().reverse().forEach(m=>{
html += `<option value="${m}">${getMonthLabel(m)}</option>`;
});

document.getElementById("bulanSelect").innerHTML = html;
}

function tambahBotol(){
let qty = Number(botolInput.value);
if(qty<=0) return;
stokBotol += qty;
botolInput.value="";
saveData(); render();
}

function kurangBotol(){
let qty = Number(botolInput.value);
if(qty<=0) return;
if(stokBotol < qty) return alert("Stok botol kurang");
stokBotol -= qty;
botolInput.value="";
saveData(); render();
}

function tambahBox(){
let qty = Number(boxInput.value);
if(qty<=0) return;
stokBox += qty;
boxInput.value="";
saveData(); render();
}

function kurangBox(){
let qty = Number(boxInput.value);
if(qty<=0) return;
if(stokBox < qty) return alert("Stok box kurang");
stokBox -= qty;
boxInput.value="";
saveData(); render();
}

function tambahBarang(){
let nama = namaBarang.value;
let qty = Number(qtyBarang.value);

if(!nama || qty<=0) return;

barang.push({nama:nama, stok:qty});
namaBarang.value="";
qtyBarang.value="";

saveData(); render();
}

function editBarang(index){
let nama = prompt("Nama", barang[index].nama);
if(nama===null) return;

let qty = prompt("Qty", barang[index].stok);
if(qty===null) return;

barang[index] = {
nama:nama,
stok:Number(qty)
};

saveData(); render();
}

function hapusBarang(index){
if(confirm("Hapus barang?")){
barang.splice(index,1);
saveData(); render();
}
}

function jualBarang(){
let index = Number(barangJual.value);
let qty = Number(qtyJual.value);
let nominal = Number(nominalJual.value);

if(qty<=0 || nominal<=0) return;

if(barang[index].stok < qty) return alert("Stok barang kurang");
if(stokBotol < qty) return alert("Stok botol kurang");
if(stokBox < qty) return alert("Stok box kurang");

barang[index].stok -= qty;
stokBotol -= qty;
stokBox -= qty;

penjualan.push({
tanggal:new Date().toISOString(),
barang:barang[index].nama,
qty:qty,
nominal:nominal
});

qtyJual.value="";
nominalJual.value="";

saveData(); render();
}

function tambahPengeluaran(){
let nominal = Number(nominalKeluar.value);
let ket = ketKeluar.value;

if(nominal<=0) return;

pengeluaran.push({
tanggal:new Date().toISOString(),
nominal:nominal,
keterangan:ket
});

nominalKeluar.value="";
ketKeluar.value="";

saveData(); render();
}

function resetData(){
if(confirm("Reset semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
updateMonthSelect();

let bulanAktif = getMonthKey(new Date());
document.getElementById("bulanAktif").innerText = getMonthLabel(bulanAktif);

let penjualanAktif = penjualan.filter(x=>getMonthKey(x.tanggal)===bulanAktif);
let pengeluaranAktif = pengeluaran.filter(x=>getMonthKey(x.tanggal)===bulanAktif);

let omzet = penjualanAktif.reduce((a,b)=>a+b.nominal,0);
let keluar = pengeluaranAktif.reduce((a,b)=>a+b.nominal,0);

stokBotol && (document.getElementById("stokBotol").innerText = stokBotol);
document.getElementById("stokBox").innerText = stokBox;
document.getElementById("totalBarang").innerText = barang.length;
document.getElementById("omzet").innerText = "Rp " + omzet.toLocaleString("id-ID");
document.getElementById("pengeluaran").innerText = "Rp " + keluar.toLocaleString("id-ID");
document.getElementById("laba").innerText = "Rp " + (omzet-keluar).toLocaleString("id-ID");

let sorted = [...barang].sort((a,b)=>a.stok-b.stok);

listBarang.innerHTML = sorted.map(x=>{
let idx = barang.findIndex(b=>b.nama===x.nama);
return `
<div class="item-barang" style="
background:${x.stok<=5 ? '#5c1f1f' : '#222'};
border:${x.stok<=5 ? '1px solid #ef4444' : 'none'};
">
<b>${x.nama}</b><br>
Stock: ${x.stok}<br>
<button class="btn-edit" onclick="editBarang(${idx})">Edit</button>
<button class="btn-delete" onclick="hapusBarang(${idx})">Hapus</button>
</div>
`;
}).join("");

barangJual.innerHTML = barang.map((x,i)=>
`<option value="${i}">${x.nama}</option>`
).join("");

let selectedMonth = bulanSelect.value || bulanAktif;

let jualBulanan = penjualan.filter(x=>getMonthKey(x.tanggal)===selectedMonth);
let keluarBulanan = pengeluaran.filter(x=>getMonthKey(x.tanggal)===selectedMonth);

let omzetBulanan = jualBulanan.reduce((a,b)=>a+b.nominal,0);
let keluarBulananTotal = keluarBulanan.reduce((a,b)=>a+b.nominal,0);

summaryBulanan.innerHTML = `
Omzet: Rp ${omzetBulanan.toLocaleString("id-ID")}<br>
Pengeluaran: Rp ${keluarBulananTotal.toLocaleString("id-ID")}<br>
Laba: Rp ${(omzetBulanan-keluarBulananTotal).toLocaleString("id-ID")}
`;

let salesMap = {};
jualBulanan.forEach(x=>{
salesMap[x.barang] = (salesMap[x.barang] || 0) + x.qty;
});

let ranking = Object.entries(salesMap)
.sort((a,b)=>b[1]-a[1])
.slice(0,3);

topSelling.innerHTML = ranking.length
? ranking.map((x,i)=>`${i+1}. ${x[0]} - ${x[1]} pcs`).join("<br>")
: "Belum ada data";

riwayatJual.innerHTML = jualBulanan.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
${x.barang} - ${x.qty} pcs<br>
Rp ${x.nominal.toLocaleString("id-ID")}
</p>
<hr>
`).join("");

riwayatKeluar.innerHTML = keluarBulanan.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
Rp ${x.nominal.toLocaleString("id-ID")}<br>
${x.keterangan}
</p>
<hr>
`).join("");
}

render();
</script>

</body>
</html>
