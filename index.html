<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVORA Inventory V2</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
text-align:center;
letter-spacing:5px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:6px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.action-btn{
width:auto;
padding:6px 10px;
margin:2px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.reset-btn{
background:#dc2626;
color:white;
}
</style>
</head>

<body>

<h1>EVORA</h1>

<div class="card">
<h3>Dashboard</h3>

<div class="stats">
<div class="stat">
<h4>Botol</h4>
<p id="stokBotol">0</p>
</div>

<div class="stat">
<h4>Box</h4>
<p id="stokBox">0</p>
</div>

<div class="stat">
<h4>Total Bibit</h4>
<p id="totalBibit">0</p>
</div>

<div class="stat">
<h4>Total Produk</h4>
<p id="totalProduk">0</p>
</div>
</div>
</div>

<div class="card">
<h3>Stock Barang</h3>

<input id="botolInput" type="number" placeholder="Stock Botol">
<input id="boxInput" type="number" placeholder="Stock Box">

<button onclick="simpanStockBarang()">
Simpan Stock Barang
</button>
</div>

<div class="card">
<h3>Tambah Bibit</h3>

<input id="namaBibit" placeholder="Nama Bibit">
<input id="stokBibit" type="number" placeholder="Stock Bibit (ml)">

<button onclick="tambahBibit()">
Tambah Bibit
</button>
</div>

<div class="card">
<h3>Daftar Bibit</h3>
<div id="listBibit"></div>
</div>

<div class="card">
<h3>Tambah Produk</h3>

<input id="namaProduk" placeholder="Nama Produk">

<select id="bibitProduk"></select>

<input id="formulaBibit" type="number" placeholder="Formula Bibit (ml)">

<button onclick="tambahProduk()">
Tambah Produk
</button>
</div>

<div class="card">
<h3>Daftar Produk</h3>
<div id="listProduk"></div>
</div>

<div class="card">
<h3>Penjualan</h3>

<select id="produkJual"></select>

<input id="qtyJual" type="number" placeholder="Qty">

<button onclick="jualProduk()">
Simpan Penjualan
</button>
</div>

<div class="card">
<h3>Riwayat Penjualan</h3>
<div id="riwayatPenjualan"></div>
</div>

<div class="card">
<button class="reset-btn" onclick="resetData()">
RESET SEMUA DATA
</button>
</div>

<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let bibit = JSON.parse(localStorage.getItem("bibit") || "[]");
let produk = JSON.parse(localStorage.getItem("produk") || "[]");
let riwayat = JSON.parse(localStorage.getItem("riwayat") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("bibit", JSON.stringify(bibit));
localStorage.setItem("produk", JSON.stringify(produk));
localStorage.setItem("riwayat", JSON.stringify(riwayat));
}

function simpanStockBarang(){
stokBotol = Number(document.getElementById("botolInput").value);
stokBox = Number(document.getElementById("boxInput").value);
saveData();
render();
}

function tambahBibit(){
let nama = document.getElementById("namaBibit").value;
let stok = Number(document.getElementById("stokBibit").value);
if(!nama) return;

bibit.push({nama:nama,stok:stok});
saveData();
render();
}

function editBibit(index){
let namaBaru = prompt("Nama Bibit", bibit[index].nama);
if(namaBaru===null) return;

let stokBaru = prompt("Stock Bibit", bibit[index].stok);
if(stokBaru===null) return;

bibit[index].nama = namaBaru;
bibit[index].stok = Number(stokBaru);

saveData();
render();
}

function hapusBibit(index){
if(confirm("Hapus bibit?")){
bibit.splice(index,1);
saveData();
render();
}
}

function tambahProduk(){
let nama = document.getElementById("namaProduk").value;
let bibitIndex = document.getElementById("bibitProduk").value;
let formula = Number(document.getElementById("formulaBibit").value);

if(!nama) return;

produk.push({
nama:nama,
bibit:bibitIndex,
formula:formula
});

saveData();
render();
}

function editProduk(index){
let namaBaru = prompt("Nama Produk", produk[index].nama);
if(namaBaru===null) return;

let formulaBaru = prompt("Formula Bibit", produk[index].formula);
if(formulaBaru===null) return;

produk[index].nama = namaBaru;
produk[index].formula = Number(formulaBaru);

saveData();
render();
}

function hapusProduk(index){
if(confirm("Hapus produk?")){
produk.splice(index,1);
saveData();
render();
}
}

function jualProduk(){
let index = document.getElementById("produkJual").value;
let qty = Number(document.getElementById("qtyJual").value);
if(qty<=0) return;

let p = produk[index];
let kebutuhanBibit = p.formula * qty;

if(stokBotol < qty){
alert("Stok botol kurang");
return;
}

if(stokBox < qty){
alert("Stok box kurang");
return;
}

if(bibit[p.bibit].stok < kebutuhanBibit){
alert("Stok bibit kurang");
return;
}

stokBotol -= qty;
stokBox -= qty;
bibit[p.bibit].stok -= kebutuhanBibit;

riwayat.push({
tanggal:new Date().toLocaleString(),
produk:p.nama,
qty:qty
});

saveData();
render();

alert("Penjualan berhasil");
}

function hapusRiwayat(index){
if(confirm("Hapus riwayat?")){
riwayat.splice(index,1);
saveData();
render();
}
}

function resetData(){
if(confirm("RESET semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
document.getElementById("stokBotol").innerText = stokBotol;
document.getElementById("stokBox").innerText = stokBox;
document.getElementById("totalBibit").innerText = bibit.length;
document.getElementById("totalProduk").innerText = produk.length;

let bibitHTML = "";
let optionBibit = "";

bibit.forEach((x,index)=>{
bibitHTML += `
<p>
${x.nama} - ${x.stok} ml
<button class="action-btn edit-btn" onclick="editBibit(${index})">Edit</button>
<button class="action-btn delete-btn" onclick="hapusBibit(${index})">Hapus</button>
</p>
`;

optionBibit += `<option value="${index}">${x.nama}</option>`;
});

document.getElementById("listBibit").innerHTML = bibitHTML;
document.getElementById("bibitProduk").innerHTML = optionBibit;

let produkHTML = "";
let optionProduk = "";

produk.forEach((x,index)=>{
produkHTML += `
<p>
${x.nama} (${bibit[x.bibit]?.nama || "-"} - ${x.formula}ml)
<button class="action-btn edit-btn" onclick="editProduk(${index})">Edit</button>
<button class="action-btn delete-btn" onclick="hapusProduk(${index})">Hapus</button>
</p>
`;

optionProduk += `<option value="${index}">${x.nama}</option>`;
});

document.getElementById("listProduk").innerHTML = produkHTML;
document.getElementById("produkJual").innerHTML = optionProduk;

let riwayatHTML = "";

riwayat.forEach((x,index)=>{
riwayatHTML += `
<p>
${x.tanggal}<br>
${x.produk} - ${x.qty} pcs
<button class="action-btn delete-btn" onclick="hapusRiwayat(${index})">Hapus</button>
</p>
`;
});

document.getElementById("riwayatPenjualan").innerHTML = riwayatHTML;
}

render();
</script>

</body>
</html>
