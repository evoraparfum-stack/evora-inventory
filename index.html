<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EVORA Inventory</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
text-align:center;
letter-spacing:6px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:6px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #333;
text-align:left;
}

.action-btn{
width:auto;
padding:6px 10px;
margin:2px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}
</style>
</head>
<body>

<h1>EVORA</h1>

<div class="card">
<h3>Dashboard</h3>
<p>Botol: <span id="stokBotol">0</span></p>
<p>Box: <span id="stokBox">0</span></p>
</div>

<div class="card">
<h3>Stock Barang</h3>

<input id="botolInput" type="number" placeholder="Stok Botol">
<input id="boxInput" type="number" placeholder="Stok Box">

<button onclick="simpanStockBarang()">
Simpan Stock Barang
</button>
</div>

<div class="card">
<h3>Tambah Bibit</h3>

<input id="namaBibit" placeholder="Nama Bibit">
<input id="stokBibit" type="number" placeholder="Stock (ml)">

<button onclick="tambahBibit()">
Tambah Bibit
</button>
</div>

<div class="card">
<h3>Daftar Bibit</h3>
<div id="listBibit"></div>
</div>

<div class="card">
<h3>Tambah Produk</h3>

<input id="namaProduk" placeholder="Nama Produk">

<select id="bibitProduk">
</select>

<input id="formulaBibit" type="number" placeholder="Bibit per botol (ml)">

<button onclick="tambahProduk()">
Tambah Produk
</button>
</div>

<div class="card">
<h3>Daftar Produk</h3>
<div id="listProduk"></div>
</div>

<div class="card">
<h3>Penjualan</h3>

<select id="produkJual">
</select>

<input id="qtyJual" type="number" placeholder="Qty">

<button onclick="jualProduk()">
Simpan Penjualan
</button>
</div>
<body>
<script>

let stokBotol = 0;
let stokBox = 0;
let bibit = [];
let produk = [];

function simpanStockBarang(){

stokBotol =
Number(document.getElementById("botolInput").value);

stokBox =
Number(document.getElementById("boxInput").value);

render();

}

function tambahBibit(){

let nama =
document.getElementById("namaBibit").value;

let stok =
Number(document.getElementById("stokBibit").value);

if(!nama) return;

bibit.push({
nama:nama,
stok:stok
});

render();

}

function editBibit(index){

let stokBaru = prompt(
"Stock baru (ml)",
bibit[index].stok
);

if(stokBaru===null) return;

bibit[index].stok =
Number(stokBaru);

render();

}

function hapusBibit(index){

if(confirm("Hapus bibit?")){

bibit.splice(index,1);
render();

}

}

function tambahProduk(){

let nama =
document.getElementById("namaProduk").value;

let bibitIndex =
document.getElementById("bibitProduk").value;

let formula =
Number(
document.getElementById("formulaBibit").value
);

if(!nama) return;

produk.push({
nama:nama,
bibit:bibitIndex,
formula:formula
});

render();

}

function jualProduk(){

let index =
document.getElementById("produkJual").value;

let qty =
Number(document.getElementById("qtyJual").value);

if(qty<=0) return;

let p = produk[index];
let kebutuhanBibit = p.formula * qty;

if(stokBotol < qty){
alert("Stok botol kurang");
return;
}

if(stokBox < qty){
alert("Stok box kurang");
return;
}

if(bibit[p.bibit].stok < kebutuhanBibit){
alert("Stok bibit kurang");
return;
}

stokBotol -= qty;
stokBox -= qty;
bibit[p.bibit].stok -= kebutuhanBibit;

alert("Penjualan berhasil");

render();

}

function render(){

document.getElementById("stokBotol").innerText =
stokBotol;

document.getElementById("stokBox").innerText =
stokBox;

let bibitHTML = "";
let optionBibit = "";

bibit.forEach((x,index)=>{

bibitHTML += `
<p>
${x.nama}: ${x.stok} ml

<button
class="action-btn edit-btn"
onclick="editBibit(${index})">
Edit
</button>

<button
class="action-btn delete-btn"
onclick="hapusBibit(${index})">
Hapus
</button>

</p>
`;

optionBibit += `
<option value="${index}">
${x.nama}
</option>
`;

});

document.getElementById("listBibit").innerHTML =
bibitHTML;

document.getElementById("bibitProduk").innerHTML =
optionBibit;

let produkHTML = "";
let optionProduk = "";

produk.forEach((x,index)=>{

produkHTML += `
<p>
${x.nama}
(${bibit[x.bibit]?.nama || "-"} - ${x.formula}ml)
</p>
`;

optionProduk += `
<option value="${index}">
${x.nama}
</option>
`;

});

document.getElementById("listProduk").innerHTML =
produkHTML;

document.getElementById("produkJual").innerHTML =
optionProduk;

}

render();

</script>

</body>
</html>
<h1>EVORA</h1>

<div class="card">
<h3>Inventory</h3>
<p>Botol: 0</p>
<p>Box: 0</p>
</div>

</body>
</html>
