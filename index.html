<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVORA Tracker</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
text-align:center;
letter-spacing:5px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:6px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.action-btn{
width:auto;
padding:6px 10px;
margin:2px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.reset-btn{
background:#dc2626;
color:white;
}
</style>
</head>

<body>

<h1>EVORA</h1>

<div class="card">
<h3>Dashboard</h3>

<div class="stats">
<div class="stat"><h4>Botol</h4><p id="stokBotol">0</p></div>
<div class="stat"><h4>Box</h4><p id="stokBox">0</p></div>
<div class="stat"><h4>Total Barang</h4><p id="totalBarang">0</p></div>
<div class="stat"><h4>Omzet</h4><p id="omzet">Rp 0</p></div>
<div class="stat"><h4>Pengeluaran</h4><p id="pengeluaran">Rp 0</p></div>
<div class="stat"><h4>Laba</h4><p id="laba">Rp 0</p></div>
</div>
</div>

<div class="card">
<h3>Stock Barang</h3>
<input id="botolInput" type="number" placeholder="Stok Botol">
<input id="boxInput" type="number" placeholder="Stok Box">
<button onclick="simpanStockBarang()">Simpan Stock</button>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="stokBarang" type="number" placeholder="Qty Stok">
<button onclick="tambahBarang()">Tambah Barang</button>
</div>

<div class="card">
<h3>Daftar Barang</h3>
<div id="listBarang"></div>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="barangJual"></select>
<input id="qtyJual" type="number" placeholder="Qty">
<input id="nominalJual" type="number" placeholder="Nominal Rp">
<button onclick="jualBarang()">Simpan Penjualan</button>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<input id="nominalKeluar" type="number" placeholder="Nominal">
<input id="keteranganKeluar" placeholder="Keterangan">
<button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
</div>

<div class="card">
<h3>Riwayat Penjualan</h3>
<div id="riwayatJual"></div>
</div>

<div class="card">
<h3>Riwayat Pengeluaran</h3>
<div id="riwayatKeluar"></div>
</div>

<div class="card">
<button class="reset-btn" onclick="resetData()">RESET SEMUA DATA</button>
</div>

<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let barang = JSON.parse(localStorage.getItem("barang") || "[]");
let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");
let pengeluaran = JSON.parse(localStorage.getItem("pengeluaran") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("barang", JSON.stringify(barang));
localStorage.setItem("penjualan", JSON.stringify(penjualan));
localStorage.setItem("pengeluaran", JSON.stringify(pengeluaran));
}

function simpanStockBarang(){
stokBotol = Number(document.getElementById("botolInput").value);
stokBox = Number(document.getElementById("boxInput").value);
saveData();
render();
}

function tambahBarang(){
let nama = document.getElementById("namaBarang").value;
let stok = Number(document.getElementById("stokBarang").value);

if(!nama || stok<=0) return;

barang.push({
nama:nama,
stok:stok
});

saveData();
render();
}

function editBarang(index){
let namaBaru = prompt("Nama Barang", barang[index].nama);
if(namaBaru===null) return;

let stokBaru = prompt("Qty Stok", barang[index].stok);
if(stokBaru===null) return;

barang[index].nama = namaBaru;
barang[index].stok = Number(stokBaru);

saveData();
render();
}

function hapusBarang(index){
if(confirm("Hapus barang?")){
barang.splice(index,1);
saveData();
render();
}
}

function jualBarang(){
let index = document.getElementById("barangJual").value;
let qty = Number(document.getElementById("qtyJual").value);
let nominal = Number(document.getElementById("nominalJual").value);

if(qty<=0 || nominal<=0) return;

if(barang[index].stok < qty){
alert("Stok barang kurang");
return;
}

if(stokBotol < qty){
alert("Stok botol kurang");
return;
}

if(stokBox < qty){
alert("Stok box kurang");
return;
}

barang[index].stok -= qty;
stokBotol -= qty;
stokBox -= qty;

penjualan.push({
tanggal:new Date().toLocaleString(),
barang:barang[index].nama,
qty:qty,
nominal:nominal
});

saveData();
render();
}

function tambahPengeluaran(){
let nominal = Number(document.getElementById("nominalKeluar").value);
let ket = document.getElementById("keteranganKeluar").value;

if(nominal<=0) return;

pengeluaran.push({
tanggal:new Date().toLocaleString(),
nominal:nominal,
keterangan:ket
});

saveData();
render();
}

function hapusPenjualan(index){
if(confirm("Hapus penjualan?")){
penjualan.splice(index,1);
saveData();
render();
}
}

function hapusPengeluaran(index){
if(confirm("Hapus pengeluaran?")){
pengeluaran.splice(index,1);
saveData();
render();
}
}

function resetData(){
if(confirm("Reset semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
document.getElementById("stokBotol").innerText = stokBotol;
document.getElementById("stokBox").innerText = stokBox;
document.getElementById("totalBarang").innerText = barang.length;

let omzet = 0;
penjualan.forEach(x => omzet += x.nominal);

let totalKeluar = 0;
pengeluaran.forEach(x => totalKeluar += x.nominal);

document.getElementById("omzet").innerText =
"Rp " + omzet.toLocaleString("id-ID");

document.getElementById("pengeluaran").innerText =
"Rp " + totalKeluar.toLocaleString("id-ID");

document.getElementById("laba").innerText =
"Rp " + (omzet-totalKeluar).toLocaleString("id-ID");

let barangHTML = "";
let optionHTML = "";

barang.forEach((x,index)=>{
barangHTML += `
<p>
${x.nama} - Stock: ${x.stok}
<button class="action-btn edit-btn" onclick="editBarang(${index})">Edit</button>
<button class="action-btn delete-btn" onclick="hapusBarang(${index})">Hapus</button>
</p>
`;

optionHTML += `
<option value="${index}">
${x.nama}
</option>
`;
});

document.getElementById("listBarang").innerHTML = barangHTML;
document.getElementById("barangJual").innerHTML = optionHTML;

let jualHTML = "";
penjualan.forEach((x,index)=>{
jualHTML += `
<p>
${x.tanggal}<br>
${x.barang} - ${x.qty} pcs - Rp ${x.nominal.toLocaleString("id-ID")}
<button class="action-btn delete-btn" onclick="hapusPenjualan(${index})">Hapus</button>
</p>
`;
});
document.getElementById("riwayatJual").innerHTML = jualHTML;

let keluarHTML = "";
pengeluaran.forEach((x,index)=>{
keluarHTML += `
<p>
${x.tanggal}<br>
Rp ${x.nominal.toLocaleString("id-ID")} - ${x.keterangan}
<button class="action-btn delete-btn" onclick="hapusPengeluaran(${index})">Hapus</button>
</p>
`;
});
document.getElementById("riwayatKeluar").innerHTML = keluarHTML;
}

render();
</script>

</body>
</html>
