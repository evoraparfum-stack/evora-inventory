<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>EVORA Tracker</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
text-align:center;
letter-spacing:5px;
}

input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.row-btn{
display:flex;
gap:8px;
}

.row-btn button{
width:50%;
}

.grid-barang{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.item-barang{
background:#222;
padding:10px;
border-radius:10px;
min-width:120px;
font-size:12px;
}

.item-barang button{
width:auto;
padding:4px 8px;
margin-top:6px;
margin-right:4px;
font-size:11px;
}

.btn-edit{
background:#f59e0b;
color:white;
}

.btn-delete{
background:#ef4444;
color:white;
}

.row-riwayat{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.scroll-box{
max-height:250px;
overflow-y:auto;
}
</style>
</head>
<body>

<h1>EVORA</h1>

<div class="card">
<h3>Dashboard</h3>
<div class="stats">
<div class="stat">Botol<br><span id="stokBotol">0</span></div>
<div class="stat">Box<br><span id="stokBox">0</span></div>
<div class="stat">Barang<br><span id="totalBarang">0</span></div>
<div class="stat">Omzet<br><span id="omzet">Rp 0</span></div>
<div class="stat">Pengeluaran<br><span id="pengeluaran">Rp 0</span></div>
<div class="stat">Laba<br><span id="laba">Rp 0</span></div>
</div>
</div>

<div class="card">
<h3>Stock Botol</h3>
<input id="botolInput" type="number" placeholder="Qty Botol">
<div class="row-btn">
<button onclick="kurangBotol()">Kurang</button>
<button onclick="tambahBotol()">Tambah</button>
</div>

<h3>Stock Box</h3>
<input id="boxInput" type="number" placeholder="Qty Box">
<div class="row-btn">
<button onclick="kurangBox()">Kurang</button>
<button onclick="tambahBox()">Tambah</button>
</div>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="qtyBarang" type="number" placeholder="Qty Stok">
<button onclick="tambahBarang()">Tambah Barang</button>
</div>

<div class="card">
<h3>Daftar Barang</h3>
<div id="listBarang" class="grid-barang"></div>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="barangJual"></select>
<input id="qtyJual" type="number" placeholder="Qty">
<input id="nominalJual" type="number" placeholder="Nominal Rp">
<button onclick="jualBarang()">Simpan Penjualan</button>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<input id="nominalKeluar" type="number" placeholder="Nominal">
<input id="ketKeluar" placeholder="Keterangan">
<button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
</div>

<div class="card">
<h3>Filter Bulan</h3>
<select id="filterBulan" onchange="render()">
<option value="all">Semua</option>
</select>
</div>

<div class="row-riwayat">
<div class="card">
<h3>Riwayat Penjualan</h3>
<div class="scroll-box">
<div id="riwayatJual"></div>
</div>
</div>

<div class="card">
<h3>Riwayat Pengeluaran</h3>
<div class="scroll-box">
<div id="riwayatKeluar"></div>
</div>
</div>
</div>

<div class="card">
<button onclick="exportLaporan()">EXPORT LAPORAN TXT</button>
</div>

<div class="card">
<button onclick="resetData()">RESET SEMUA DATA</button>
</div>

<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let barang = JSON.parse(localStorage.getItem("barang") || "[]");
let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");
let pengeluaran = JSON.parse(localStorage.getItem("pengeluaran") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("barang", JSON.stringify(barang));
localStorage.setItem("penjualan", JSON.stringify(penjualan));
localStorage.setItem("pengeluaran", JSON.stringify(pengeluaran));
}

function getMonthKey(dateString){
let d = new Date(dateString);
let month = String(d.getMonth()+1).padStart(2,'0');
return `${d.getFullYear()}-${month}`;
}

function updateFilterBulan(){
let bulanSet = new Set();

penjualan.forEach(x=>bulanSet.add(getMonthKey(x.tanggal)));
pengeluaran.forEach(x=>bulanSet.add(getMonthKey(x.tanggal)));

let selected = document.getElementById("filterBulan")?.value || "all";
let html = `<option value="all">Semua</option>`;

[...bulanSet].sort().forEach(b=>{
html += `<option value="${b}">${b}</option>`;
});

document.getElementById("filterBulan").innerHTML = html;
document.getElementById("filterBulan").value = selected;
}

function tambahBotol(){
let qty = Number(document.getElementById("botolInput").value);
if(qty<=0) return;
stokBotol += qty;
document.getElementById("botolInput").value="";
saveData();
render();
}

function kurangBotol(){
let qty = Number(document.getElementById("botolInput").value);
if(qty<=0) return;
if(stokBotol < qty) return alert("Stok botol kurang");
stokBotol -= qty;
document.getElementById("botolInput").value="";
saveData();
render();
}

function tambahBox(){
let qty = Number(document.getElementById("boxInput").value);
if(qty<=0) return;
stokBox += qty;
document.getElementById("boxInput").value="";
saveData();
render();
}

function kurangBox(){
let qty = Number(document.getElementById("boxInput").value);
if(qty<=0) return;
if(stokBox < qty) return alert("Stok box kurang");
stokBox -= qty;
document.getElementById("boxInput").value="";
saveData();
render();
}

function tambahBarang(){
let nama = document.getElementById("namaBarang").value;
let qty = Number(document.getElementById("qtyBarang").value);

if(!nama || qty<=0) return;

barang.push({nama:nama, stok:qty});

document.getElementById("namaBarang").value="";
document.getElementById("qtyBarang").value="";

saveData();
render();
}

function editBarang(index){
let namaBaru = prompt("Nama Barang", barang[index].nama);
if(namaBaru===null) return;

let qtyBaru = prompt("Qty Stok", barang[index].stok);
if(qtyBaru===null) return;

barang[index] = {
nama:namaBaru,
stok:Number(qtyBaru)
};

saveData();
render();
}

function hapusBarang(index){
if(confirm("Hapus barang?")){
barang.splice(index,1);
saveData();
render();
}
}

function jualBarang(){
let index = document.getElementById("barangJual").value;
let qty = Number(document.getElementById("qtyJual").value);
let nominal = Number(document.getElementById("nominalJual").value);

if(qty<=0 || nominal<=0) return;

if(barang[index].stok < qty) return alert("Stok barang kurang");
if(stokBotol < qty) return alert("Stok botol kurang");
if(stokBox < qty) return alert("Stok box kurang");

barang[index].stok -= qty;
stokBotol -= qty;
stokBox -= qty;

penjualan.push({
tanggal:new Date().toISOString(),
barang:barang[index].nama,
qty:qty,
nominal:nominal
});

document.getElementById("qtyJual").value="";
document.getElementById("nominalJual").value="";

saveData();
render();
}

function tambahPengeluaran(){
let nominal = Number(document.getElementById("nominalKeluar").value);
let ket = document.getElementById("ketKeluar").value;

if(nominal<=0) return;

pengeluaran.push({
tanggal:new Date().toISOString(),
nominal:nominal,
keterangan:ket
});

document.getElementById("nominalKeluar").value="";
document.getElementById("ketKeluar").value="";

saveData();
render();
}

function exportLaporan(){
let omzet = penjualan.reduce((a,b)=>a+b.nominal,0);
let keluar = pengeluaran.reduce((a,b)=>a+b.nominal,0);
let laba = omzet-keluar;

let text = 
`LAPORAN EVORA

Omzet: Rp ${omzet.toLocaleString("id-ID")}
Pengeluaran: Rp ${keluar.toLocaleString("id-ID")}
Laba: Rp ${laba.toLocaleString("id-ID")}
`;

let blob = new Blob([text], {type:'text/plain'});
let a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = "laporan_evora.txt";
a.click();
}

function resetData(){
if(confirm("Reset semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
updateFilterBulan();

let filter = document.getElementById("filterBulan").value || "all";

let filteredPenjualan = filter==="all"
? penjualan
: penjualan.filter(x=>getMonthKey(x.tanggal)===filter);

let filteredPengeluaran = filter==="all"
? pengeluaran
: pengeluaran.filter(x=>getMonthKey(x.tanggal)===filter);

document.getElementById("stokBotol").innerText = stokBotol;
document.getElementById("stokBox").innerText = stokBox;
document.getElementById("totalBarang").innerText = barang.length;

let omzet = filteredPenjualan.reduce((a,b)=>a+b.nominal,0);
let keluar = filteredPengeluaran.reduce((a,b)=>a+b.nominal,0);

document.getElementById("omzet").innerText = "Rp " + omzet.toLocaleString("id-ID");
document.getElementById("pengeluaran").innerText = "Rp " + keluar.toLocaleString("id-ID");
document.getElementById("laba").innerText = "Rp " + (omzet-keluar).toLocaleString("id-ID");

let sortedBarang = [...barang].sort((a,b)=>a.stok-b.stok);

document.getElementById("listBarang").innerHTML =
sortedBarang.map(x=>{
let originalIndex = barang.findIndex(b=>b.nama===x.nama);
return `
<div class="item-barang" style="
background:${x.stok <= 5 ? '#5c1f1f' : '#222'};
border:${x.stok <= 5 ? '1px solid #ef4444' : 'none'};
">
<b>${x.nama}</b><br>
Stock: ${x.stok}<br>
<button class="btn-edit" onclick="editBarang(${originalIndex})">Edit</button>
<button class="btn-delete" onclick="hapusBarang(${originalIndex})">Hapus</button>
</div>
`;
}).join("");

document.getElementById("barangJual").innerHTML =
barang.map((x,i)=>`<option value="${i}">${x.nama}</option>`).join("");

document.getElementById("riwayatJual").innerHTML =
filteredPenjualan.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
${x.barang} - ${x.qty} pcs<br>
Rp ${x.nominal.toLocaleString("id-ID")}
</p>
<hr style="border:0;border-top:1px solid #333;">
`).join("");

document.getElementById("riwayatKeluar").innerHTML =
filteredPengeluaran.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
Rp ${x.nominal.toLocaleString("id-ID")}<br>
${x.keterangan}
</p>
<hr style="border:0;border-top:1px solid #333;">
`).join("");
}

render();
</script>

</body>
</html>
