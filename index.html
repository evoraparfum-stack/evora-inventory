<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVORA Tracker</title>

<style>
*{box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
margin:0;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button,textarea{
width:100%;
padding:14px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:17px;
}

button{
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.row-btn{
display:flex;
gap:8px;
}

.row-btn button{
width:50%;
}

.grid-barang{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.item-barang{
background:#222;
padding:10px;
border-radius:10px;
min-width:120px;
font-size:12px;
}

.item-barang button{
width:auto;
padding:5px 8px;
font-size:11px;
margin-top:5px;
margin-right:4px;
}

.btn-edit{
background:#f59e0b;
color:white;
}

.btn-delete{
background:#ef4444;
color:white;
}

.scroll-box{
max-height:250px;
overflow-y:auto;
}

.row-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
</style>
</head>
<body>

<div class="card">
<h3>Dashboard</h3>
<p id="bulanAktif"></p>

<div class="stats">
<div class="stat">Botol<br><span id="stokBotol">0</span></div>
<div class="stat">Box<br><span id="stokBox">0</span></div>
<div class="stat">Barang<br><span id="totalBarang">0</span></div>
<div class="stat">Omzet<br><span id="omzet">Rp 0</span></div>
<div class="stat">Pengeluaran<br><span id="pengeluaran">Rp 0</span></div>
<div class="stat">Laba<br><span id="laba">Rp 0</span></div>
</div>
</div>

<div class="card">
<h3>Stock Botol</h3>
<input id="botolInput" type="number" placeholder="Qty Botol">
<div class="row-btn">
<button onclick="kurangBotol()">Kurang</button>
<button onclick="tambahBotol()">Tambah</button>
</div>

<h3>Stock Box</h3>
<input id="boxInput" type="number" placeholder="Qty Box">
<div class="row-btn">
<button onclick="kurangBox()">Kurang</button>
<button onclick="tambahBox()">Tambah</button>
</div>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="qtyBarang" type="number" placeholder="Qty Stok">
<button onclick="tambahBarang()">Tambah Barang</button>
</div>

<div class="card">
<h3>Daftar Barang</h3>
<div id="listBarang" class="grid-barang"></div>
</div>

<div class="card">
<h3>Penjualan Manual</h3>
<select id="barangJual"></select>
<input id="qtyJual" type="number" placeholder="Qty">
<input id="nominalJual" type="number" placeholder="Nominal Rp">
<button onclick="jualBarang()">Simpan Penjualan</button>
</div>

<div class="card">
<h3>AI Scan Import</h3>
<textarea id="scanInput" rows="6" placeholder="Contoh:
ICARUS:2
MONRO:1"></textarea>
<button onclick="prosesScan()">Proses Scan</button>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<input id="nominalKeluar" type="number" placeholder="Nominal">
<input id="ketKeluar" placeholder="Keterangan">
<button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
</div>

<div class="card">
<h3>Riwayat Bulanan</h3>
<select id="bulanSelect" onchange="render()"></select>
</div>

<div class="card">
<h3>Summary Bulanan</h3>
<div id="summaryBulanan"></div>
</div>

<div class="card">
<h3>Top Selling</h3>
<div id="topSelling"></div>
</div>

<div class="row-2">
<div class="card">
<h3>Detail Penjualan</h3>
<div id="riwayatJual" class="scroll-box"></div>
</div>

<div class="card">
<h3>Detail Pengeluaran</h3>
<div id="riwayatKeluar" class="scroll-box"></div>
</div>
</div>

<div class="card">
<button onclick="resetData()">RESET SEMUA DATA</button>
</div>
<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let barang = JSON.parse(localStorage.getItem("barang") || "[]");
let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");
let pengeluaran = JSON.parse(localStorage.getItem("pengeluaran") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("barang", JSON.stringify(barang));
localStorage.setItem("penjualan", JSON.stringify(penjualan));
localStorage.setItem("pengeluaran", JSON.stringify(pengeluaran));
}

function getMonthKey(date){
let d = new Date(date);
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function getMonthLabel(key){
let bulan = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
let [y,m] = key.split("-");
return bulan[Number(m)-1]+" "+y;
}

function updateMonthSelect(){
let set = new Set();
penjualan.forEach(x=>set.add(getMonthKey(x.tanggal)));
pengeluaran.forEach(x=>set.add(getMonthKey(x.tanggal)));
set.add(getMonthKey(new Date()));

bulanSelect.innerHTML = [...set].sort().reverse()
.map(m=>`<option value="${m}">${getMonthLabel(m)}</option>`).join("");
}

function tambahBotol(){
let qty = Number(botolInput.value);
if(qty<=0) return;
stokBotol += qty;
botolInput.value="";
saveData(); render();
}

function kurangBotol(){
let qty = Number(botolInput.value);
if(qty<=0) return;
if(stokBotol<qty) return alert("Stok botol kurang");
stokBotol -= qty;
botolInput.value="";
saveData(); render();
}

function tambahBox(){
let qty = Number(boxInput.value);
if(qty<=0) return;
stokBox += qty;
boxInput.value="";
saveData(); render();
}

function kurangBox(){
let qty = Number(boxInput.value);
if(qty<=0) return;
if(stokBox<qty) return alert("Stok box kurang");
stokBox -= qty;
boxInput.value="";
saveData(); render();
}

function tambahBarang(){
let nama = namaBarang.value;
let qty = Number(qtyBarang.value);
if(!nama || qty<=0) return;

barang.push({nama:nama, stok:qty});
namaBarang.value="";
qtyBarang.value="";
saveData();
render();
}

function editBarang(i){
let nama = prompt("Nama", barang[i].nama);
if(nama===null) return;
let qty = prompt("Qty", barang[i].stok);
if(qty===null) return;

barang[i] = {
nama:nama,
stok:Number(qty)
};

saveData();
render();
}

function hapusBarang(i){
if(confirm("Hapus barang?")){
barang.splice(i,1);
saveData();
render();
}
}

function jualBarang(){
let i = Number(barangJual.value);
let qty = Number(qtyJual.value);
let nominal = Number(nominalJual.value);

if(qty<=0 || nominal<=0) return;

if(barang[i].stok < qty) return alert("Stok barang kurang");
if(stokBotol < qty) return alert("Stok botol kurang");
if(stokBox < qty) return alert("Stok box kurang");

barang[i].stok -= qty;
stokBotol -= qty;
stokBox -= qty;

penjualan.push({
tanggal:new Date().toISOString(),
barang:barang[i].nama,
qty:qty,
nominal:nominal
});

qtyJual.value="";
nominalJual.value="";
saveData();
render();
}

function prosesScan(){
let text = scanInput.value.trim();
if(!text) return;

let lines = text.split("\n");
let totalQty = 0;

for(let line of lines){
line = line.trim();

if(!line || line.startsWith("TOTAL")) continue;

let parts = line.split(":");
if(parts.length !== 2) continue;

let nama = parts[0].trim().toUpperCase();
let qty = Number(parts[1].trim());

if(qty<=0) continue;

let index = barang.findIndex(x =>
x.nama.toUpperCase().includes(nama)
);

if(index===-1){
alert("Barang tidak ditemukan: " + nama);
continue;
}

if(barang[index].stok < qty){
alert("Stok kurang: " + barang[index].nama);
continue;
}

barang[index].stok -= qty;
totalQty += qty;

penjualan.push({
tanggal:new Date().toISOString(),
barang:barang[index].nama,
qty:qty,
nominal:0
});
}

if(stokBotol < totalQty){
alert("Stok botol kurang");
return;
}

if(stokBox < totalQty){
alert("Stok box kurang");
return;
}

stokBotol -= totalQty;
stokBox -= totalQty;

scanInput.value="";
saveData();
render();
alert("Scan berhasil");
}

function tambahPengeluaran(){
let nominal = Number(nominalKeluar.value);
let ket = ketKeluar.value;

if(nominal<=0) return;

pengeluaran.push({
tanggal:new Date().toISOString(),
nominal:nominal,
keterangan:ket
});

nominalKeluar.value="";
ketKeluar.value="";
saveData();
render();
}

function resetData(){
if(confirm("Reset semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
updateMonthSelect();

let bulanAktif = getMonthKey(new Date());
bulanAktifText.innerText = getMonthLabel(bulanAktif);

let jualAktif = penjualan.filter(x=>getMonthKey(x.tanggal)===bulanAktif);
let keluarAktif = pengeluaran.filter(x=>getMonthKey(x.tanggal)===bulanAktif);

let omzet = jualAktif.reduce((a,b)=>a+b.nominal,0);
let keluar = keluarAktif.reduce((a,b)=>a+b.nominal,0);

stokBotolText.innerText = stokBotol;
stokBoxText.innerText = stokBox;
totalBarang.innerText = barang.length;
omzetText.innerText = "Rp "+omzet.toLocaleString("id-ID");
pengeluaranText.innerText = "Rp "+keluar.toLocaleString("id-ID");
labaText.innerText = "Rp "+(omzet-keluar).toLocaleString("id-ID");

let sorted = [...barang].sort((a,b)=>a.stok-b.stok);

listBarang.innerHTML = sorted.map(x=>{
let idx = barang.findIndex(b=>b.nama===x.nama);

return `
<div class="item-barang" style="
background:${x.stok<=5 ? '#5c1f1f' : '#222'};
border:${x.stok<=5 ? '1px solid #ef4444' : 'none'};
">
<b>${x.nama}</b><br>
Stock: ${x.stok}<br>
<button class="btn-edit" onclick="editBarang(${idx})">Edit</button>
<button class="btn-delete" onclick="hapusBarang(${idx})">Hapus</button>
</div>`;
}).join("");

barangJual.innerHTML = barang.map((x,i)=>
`<option value="${i}">${x.nama}</option>`).join("");

let bulan = bulanSelect.value || bulanAktif;

let jualBulanan = penjualan.filter(x=>getMonthKey(x.tanggal)===bulan);
let keluarBulanan = pengeluaran.filter(x=>getMonthKey(x.tanggal)===bulan);

let omzetBulanan = jualBulanan.reduce((a,b)=>a+b.nominal,0);
let keluarBulananTotal = keluarBulanan.reduce((a,b)=>a+b.nominal,0);

summaryBulanan.innerHTML = `
Omzet: Rp ${omzetBulanan.toLocaleString("id-ID")}<br>
Pengeluaran: Rp ${keluarBulananTotal.toLocaleString("id-ID")}<br>
Laba: Rp ${(omzetBulanan-keluarBulananTotal).toLocaleString("id-ID")}
`;

let salesMap = {};
jualBulanan.forEach(x=>{
salesMap[x.barang]=(salesMap[x.barang]||0)+x.qty;
});

let ranking = Object.entries(salesMap)
.sort((a,b)=>b[1]-a[1])
.slice(0,3);

topSelling.innerHTML = ranking.length
? ranking.map((x,i)=>`${i+1}. ${x[0]} - ${x[1]} pcs`).join("<br>")
: "Belum ada data";

riwayatJual.innerHTML = jualBulanan.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
${x.barang} - ${x.qty} pcs<br>
Rp ${x.nominal.toLocaleString("id-ID")}
</p><hr>`).join("");

riwayatKeluar.innerHTML = keluarBulanan.map(x=>`
<p>
${new Date(x.tanggal).toLocaleString("id-ID")}<br>
Rp ${x.nominal.toLocaleString("id-ID")}<br>
${x.keterangan}
</p><hr>`).join("");
}

const bulanAktifText = document.getElementById("bulanAktif");
const stokBotolText = document.getElementById("stokBotol");
const stokBoxText = document.getElementById("stokBox");
const omzetText = document.getElementById("omzet");
const pengeluaranText = document.getElementById("pengeluaran");
const labaText = document.getElementById("laba");

render();
</script>

</body>
</html>
