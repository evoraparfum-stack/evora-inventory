<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EVORA Tracker</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
padding:15px;
}

.card{
background:#1d1d1d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

h1{
text-align:center;
letter-spacing:5px;
}

input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
font-weight:bold;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}

.action-btn{
width:auto;
padding:6px 10px;
margin-left:5px;
font-size:12px;
}

.edit-btn{
background:#f59e0b;
color:#fff;
}

.delete-btn{
background:#ef4444;
color:#fff;
}
</style>
</head>
<body>

<h1>EVORA</h1>

<div class="card">
<h3>Dashboard</h3>
<div class="stats">
<div class="stat">Botol<br><span id="stokBotol">0</span></div>
<div class="stat">Box<br><span id="stokBox">0</span></div>
<div class="stat">Barang<br><span id="totalBarang">0</span></div>
<div class="stat">Omzet<br><span id="omzet">Rp 0</span></div>
<div class="stat">Pengeluaran<br><span id="pengeluaran">Rp 0</span></div>
<div class="stat">Laba<br><span id="laba">Rp 0</span></div>
</div>
</div>

<div class="card">
<h3>Tambah Stock</h3>
<input id="botolInput" type="number" placeholder="Tambah Stok Botol">
<input id="boxInput" type="number" placeholder="Tambah Stok Box">
<button onclick="simpanStock()">Simpan Stock</button>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<input id="namaBarang" placeholder="Nama Barang">
<input id="qtyBarang" type="number" placeholder="Qty Stok">
<button onclick="tambahBarang()">Tambah Barang</button>
</div>

<div class="card">
<h3>Daftar Barang</h3>
<div id="listBarang"></div>
</div>

<div class="card">
<h3>Penjualan</h3>
<select id="barangJual"></select>
<input id="qtyJual" type="number" placeholder="Qty">
<input id="nominalJual" type="number" placeholder="Nominal Rp">
<button onclick="jualBarang()">Simpan Penjualan</button>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<input id="nominalKeluar" type="number" placeholder="Nominal">
<input id="ketKeluar" placeholder="Keterangan">
<button onclick="tambahPengeluaran()">Simpan Pengeluaran</button>
</div>

<div class="card">
<h3>Riwayat Penjualan</h3>
<div id="riwayatJual"></div>
</div>

<div class="card">
<h3>Riwayat Pengeluaran</h3>
<div id="riwayatKeluar"></div>
</div>

<div class="card">
<button onclick="resetData()">RESET SEMUA DATA</button>
</div>

<script>
let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
let stokBox = Number(localStorage.getItem("stokBox") || 0);
let barang = JSON.parse(localStorage.getItem("barang") || "[]");
let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");
let pengeluaran = JSON.parse(localStorage.getItem("pengeluaran") || "[]");

function saveData(){
localStorage.setItem("stokBotol", stokBotol);
localStorage.setItem("stokBox", stokBox);
localStorage.setItem("barang", JSON.stringify(barang));
localStorage.setItem("penjualan", JSON.stringify(penjualan));
localStorage.setItem("pengeluaran", JSON.stringify(pengeluaran));
}

function simpanStock(){
let botolInput = document.getElementById("botolInput").value;
let boxInput = document.getElementById("boxInput").value;

if(botolInput !== "") stokBotol += Number(botolInput);
if(boxInput !== "") stokBox += Number(boxInput);

document.getElementById("botolInput").value = "";
document.getElementById("boxInput").value = "";

saveData();
render();
}

function tambahBarang(){
let nama = document.getElementById("namaBarang").value;
let qty = Number(document.getElementById("qtyBarang").value);
if(!nama || qty<=0) return;

barang.push({nama:nama, stok:qty});
saveData();
render();
}

function editBarang(index){
let namaBaru = prompt("Nama Barang", barang[index].nama);
if(namaBaru===null) return;

let qtyBaru = prompt("Qty Stok", barang[index].stok);
if(qtyBaru===null) return;

barang[index] = {nama:namaBaru, stok:Number(qtyBaru)};
saveData();
render();
}

function hapusBarang(index){
if(confirm("Hapus barang?")){
barang.splice(index,1);
saveData();
render();
}
}

function jualBarang(){
let index = document.getElementById("barangJual").value;
let qty = Number(document.getElementById("qtyJual").value);
let nominal = Number(document.getElementById("nominalJual").value);

if(qty<=0 || nominal<=0) return;

if(barang[index].stok < qty) return alert("Stok barang kurang");
if(stokBotol < qty) return alert("Stok botol kurang");
if(stokBox < qty) return alert("Stok box kurang");

barang[index].stok -= qty;
stokBotol -= qty;
stokBox -= qty;

penjualan.push({
tanggal:new Date().toLocaleString(),
barang:barang[index].nama,
qty:qty,
nominal:nominal
});

saveData();
render();
}

function tambahPengeluaran(){
let nominal = Number(document.getElementById("nominalKeluar").value);
let ket = document.getElementById("ketKeluar").value;
if(nominal<=0) return;

pengeluaran.push({
tanggal:new Date().toLocaleString(),
nominal:nominal,
keterangan:ket
});

saveData();
render();
}

function resetData(){
if(confirm("Reset semua data?")){
localStorage.clear();
location.reload();
}
}

function render(){
document.getElementById("stokBotol").innerText = stokBotol;
document.getElementById("stokBox").innerText = stokBox;
document.getElementById("totalBarang").innerText = barang.length;

let omzet = penjualan.reduce((a,b)=>a+b.nominal,0);
let keluar = pengeluaran.reduce((a,b)=>a+b.nominal,0);

document.getElementById("omzet").innerText = "Rp " + omzet.toLocaleString("id-ID");
document.getElementById("pengeluaran").innerText = "Rp " + keluar.toLocaleString("id-ID");
document.getElementById("laba").innerText = "Rp " + (omzet-keluar).toLocaleString("id-ID");

document.getElementById("listBarang").innerHTML =
barang.map((x,i)=>`
<p>${x.nama} - Stock: ${x.stok}
<button onclick="editBarang(${i})">Edit</button>
<button onclick="hapusBarang(${i})">Hapus</button>
</p>
`).join("");

document.getElementById("barangJual").innerHTML =
barang.map((x,i)=>`<option value="${i}">${x.nama}</option>`).join("");

document.getElementById("riwayatJual").innerHTML =
penjualan.map(x=>`<p>${x.barang} - ${x.qty} pcs - Rp ${x.nominal.toLocaleString("id-ID")}</p>`).join("");

document.getElementById("riwayatKeluar").innerHTML =
pengeluaran.map(x=>`<p>Rp ${x.nominal.toLocaleString("id-ID")} - ${x.keterangan}</p>`).join("");
}

render();
</script>

</body>
</html>
