<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVORA Tracker Pro - Full System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0d0d12; --card: #161622; --primary: #3b82f6; --success: #10b981; --danger: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #2a2a3c; color: white; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        #notifyContainer { position: fixed; top: 10px; right: 10px; z-index: 9999; }
        .toast { background: var(--success); padding: 10px 15px; border-radius: 8px; margin-bottom: 5px; animation: slideIn 0.3s; font-size: 12px; }
        @keyframes slideIn { from { transform: translateX(100%); } }
        #cameraArea { display: none; margin-top: 10px; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .scroll-box { max-height: 150px; overflow-y: auto; background: #1f1f2e; padding: 10px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div id="notifyContainer"></div>

<div class="card">
    <h3>Dashboard Utama</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align:center;">
        <div>Omzet<br><b id="omzetVal">Rp 0</b></div>
        <div>Botol<br><b id="stokBotol">0</b></div>
        <div>Box<br><b id="stokBox">0</b></div>
    </div>
</div>

<div class="card">
    <h3>Manajemen Stok & Kasir</h3>
    <input type="number" id="qtyInput" placeholder="Jumlah (Qty)...">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button onclick="updateStok('botol', 1)">+Botol</button>
        <button class="btn-danger" onclick="updateStok('botol', -1)">-Botol</button>
        <button onclick="updateStok('box', 1)">+Box</button>
        <button class="btn-danger" onclick="updateStok('box', -1)">-Box</button>
    </div>
    <button onclick="toggleKamera()" style="margin-top:10px;">📸 Buka AI Scanner</button>
    <div id="cameraArea">
        <video id="videoFeed" autoplay playsinline></video>
        <button class="btn-success" onclick="scan()">⚡ Proses Scan</button>
    </div>
</div>

<div class="card">
    <h3>Riwayat & Data</h3>
    <div id="riwayatJual" class="scroll-box"></div>
    <button class="btn-danger" onclick="resetApp()" style="margin-top:10px;">Reset Database</button>
</div>

<script>
    let stokBotol = Number(localStorage.getItem("stokBotol") || 0);
    let stokBox = Number(localStorage.getItem("stokBox") || 0);
    let penjualan = JSON.parse(localStorage.getItem("penjualan") || "[]");

    function showToast(msg) {
        const container = document.getElementById("notifyContainer");
        const div = document.createElement("div");
        div.className = "toast";
        div.innerText = msg;
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function updateUI() {
        document.getElementById("omzetVal").innerText = "Rp " + penjualan.reduce((a,b) => a + (b.qty * 27000), 0).toLocaleString();
        document.getElementById("stokBotol").innerText = stokBotol;
        document.getElementById("stokBox").innerText = stokBox;
        document.getElementById("riwayatJual").innerHTML = penjualan.length ? penjualan.map(x => 
            `<p>• ${new Date(x.tanggal).toLocaleTimeString()} - Qty: ${x.qty}</p>`).join("") : "Belum ada transaksi.";
    }

    function updateStok(tipe, oper) {
        let val = Number(document.getElementById("qtyInput").value) || 0;
        if(tipe === 'botol') { stokBotol += (val * oper); localStorage.setItem("stokBotol", stokBotol); }
        else { stokBox += (val * oper); localStorage.setItem("stokBox", stokBox); }
        updateUI();
        showToast("Stok " + tipe + " diupdate!");
    }

    async function toggleKamera() {
        const area = document.getElementById("cameraArea");
        area.style.display = area.style.display === "block" ? "none" : "block";
        if(area.style.display === "block") {
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
            document.getElementById("videoFeed").srcObject = stream;
        }
    }

    async function scan() {
        const video = document.getElementById("videoFeed");
        const { data } = await Tesseract.recognize(video, 'eng');
        penjualan.push({ tanggal: new Date(), qty: 1 });
        localStorage.setItem("penjualan", JSON.stringify(penjualan));
        showToast("Scan Berhasil: " + data.text.substring(0, 10));
        updateUI();
    }

    function resetApp() {
        if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); }
    }

    // Notifikasi Awal
    const now = new Date();
    showToast("Sistem Diperbarui: " + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
    updateUI();
</script>
</body>
</html>
